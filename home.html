<!-- Cashout -->
 <section>

 <label class="label font-bold text-neutral-950 text-lg">Amount</label>

  <label class="label font-bold text-neutral-950 text-lg">4 Digit Pin</label>
  <input id="cashOutPin" class="rounded-full p-2.5 bg-[#F4F5F7]  " maxlength="4" type="password" class="input" placeholder="Enter 4 Digit Pin" />
